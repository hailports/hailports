name: Release wells-index

# Builds wells-index wheels for Linux/macOS/Windows on Python 3.12 + 3.13 and
# publishes them to PyPI. Trigger by pushing a tag like `index-v0.1.1`, or run
# manually from the Actions tab (workflow_dispatch builds without publishing
# unless "publish" is set to true).
#
# Publishing auth: PyPI "trusted publishing" (configure this repo + workflow
# as a trusted publisher for the wells-index project on pypi.org — no token
# needed). The pypi environment + id-token permission below are required.

on:
  push:
    tags: ["index-v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI"
        type: boolean
        default: false

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.12
            3.13

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: wells-index
          command: build
          args: --release --interpreter python3.12 python3.13
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wells-index/target/wheels/*.whl

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/index-v') || inputs.publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
